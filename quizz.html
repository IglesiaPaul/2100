<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz - Programme L'Avenir en commun</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .quizz-container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            background: #f5f5f5;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border-left: 5px solid #2b9e4a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover {
            border-color: #2b9e4a;
            background: #e8f5e9;
        }
        .option-btn.correct {
            background: #2b9e4a;
            color: white;
            border-color: #2b9e4a;
        }
        .option-btn.wrong {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }
        .feedback {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 12px;
            font-weight: bold;
        }
        .feedback.correct-feedback {
            background: #e8f5e9;
            color: #2b9e4a;
        }
        .feedback.wrong-feedback {
            background: #fdeded;
            color: #e74c3c;
        }
        .score {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .progress {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }
        .next-btn {
            background: #2b9e4a;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            display: block;
            margin: 1rem auto 0;
        }
        .restart-btn {
            background: #3498db;
            margin-top: 0.5rem;
        }
        .settings {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        .settings label {
            font-weight: bold;
        }
        .settings select {
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .final-score {
            text-align: center;
            margin: 2rem 0;
            padding: 1rem;
            background: #e8f5e9;
            border-radius: 16px;
        }
        .final-score h2 {
            margin: 0 0 0.5rem;
        }
        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .share-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            background: #2b9e4a;
        }
        .share-twitter { background: #1DA1F2; }
        .share-facebook { background: #4267B2; }
        .share-whatsapp { background: #25D366; }
        .share-copy { background: #6c757d; }
        .error-message {
            background: #fdeded;
            color: #e74c3c;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <script src="js/nav.js"></script>

    <div class="quizz-container" id="quizzContainer">
        <div class="settings">
            <label>📊 Nombre de questions :</label>
            <select id="questionCountSelect">
                <option value="5">5 questions</option>
                <option value="10" selected>10 questions</option>
                <option value="20">20 questions</option>
                <option value="-1">Illimité (infini)</option>
            </select>
            <button id="restartQuizzBtn" class="restart-btn" style="padding: 0.3rem 1rem;">🔄 Redémarrer</button>
        </div>
        <div class="score" id="scoreDisplay">Score : 0 / 0</div>
        <div class="progress" id="progressDisplay"></div>
        <div id="questionArea">
            <div class="question-text" id="questionText">Chargement...</div>
            <div class="options" id="optionsContainer"></div>
            <div id="feedback"></div>
            <button id="nextBtn" class="next-btn" style="display: none;">Question suivante →</button>
        </div>
        <div id="shareArea" style="display: none;">
            <div class="final-score" id="finalScoreArea"></div>
            <div class="share-buttons">
                <a href="#" id="shareTwitter" class="share-btn share-twitter" target="_blank">🐦 Twitter</a>
                <a href="#" id="shareFacebook" class="share-btn share-facebook" target="_blank">📘 Facebook</a>
                <a href="#" id="shareWhatsApp" class="share-btn share-whatsapp" target="_blank">💬 WhatsApp</a>
                <button id="shareCopy" class="share-btn share-copy">📋 Copier le lien</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        function initQuizz() {
            if (typeof mesures === 'undefined' || !mesures.length) {
                document.getElementById('questionText').innerHTML = '<div class="error-message">❌ Base de données non chargée. Vérifiez que le fichier js/data.js existe et contient la variable "mesures".</div>';
                return;
            }
            
            let currentMesures = mesures;
            let currentQuestion = null;
            let score = 0;
            let questionsAnswered = 0;
            let waitingForNext = false;
            let totalQuestions = 10; // valeur par défaut
            let gameActive = true;
            let maxQuestions = totalQuestions;
            
            const select = document.getElementById('questionCountSelect');
            const restartBtn = document.getElementById('restartQuizzBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shareArea = document.getElementById('shareArea');
            const questionArea = document.getElementById('questionArea');
            
            function getRandomTitles(excludeTitle, excludeId) {
                const others = currentMesures.filter(m => m.id !== excludeId && m.titre !== excludeTitle);
                for (let i = others.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [others[i], others[j]] = [others[j], others[i]];
                }
                return others.slice(0, 3).map(m => m.titre);
            }
            
            function updateUI() {
                document.getElementById('scoreDisplay').innerHTML = `Score : ${score} / ${questionsAnswered}`;
                if (maxQuestions > 0 && questionsAnswered <= maxQuestions) {
                    document.getElementById('progressDisplay').innerHTML = `Question ${questionsAnswered} / ${maxQuestions === -1 ? '∞' : maxQuestions}`;
                }
            }
            
            function endGame() {
                gameActive = false;
                questionArea.style.display = 'none';
                shareArea.style.display = 'block';
                const percentage = Math.round((score / questionsAnswered) * 100);
                let message = '';
                if (percentage === 100) message = '🎉 Parfait ! Vous êtes incollable sur le programme !';
                else if (percentage >= 80) message = '👍 Très bien ! Vous connaissez bien le programme.';
                else if (percentage >= 50) message = '📚 Pas mal ! Continuez à découvrir le programme.';
                else message = '🌱 Continuez à explorer le programme pour mieux le connaître !';
                document.getElementById('finalScoreArea').innerHTML = `
                    <h2>✨ Quizz terminé ✨</h2>
                    <p>Votre score : <strong>${score} / ${questionsAnswered}</strong> (${percentage}%)</p>
                    <p>${message}</p>
                `;
                // Partager le résultat
                const shareText = `J'ai obtenu ${score}/${questionsAnswered} au quizz du programme "L'Avenir en commun" ! Et vous ? Testez vos connaissances :`;
                const shareUrl = encodeURIComponent(window.location.href);
                document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${shareUrl}`;
                document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`;
                document.getElementById('shareWhatsApp').href = `https://wa.me/?text=${encodeURIComponent(shareText + ' ' + window.location.href)}`;
                document.getElementById('shareCopy').onclick = () => {
                    navigator.clipboard.writeText(window.location.href);
                    alert('Lien copié !');
                };
            }
            
            function generateQuestion() {
                if (!gameActive) return;
                if (maxQuestions !== -1 && questionsAnswered >= maxQuestions) {
                    endGame();
                    return;
                }
                const randomIndex = Math.floor(Math.random() * currentMesures.length);
                const measure = currentMesures[randomIndex];
                const correctTitle = measure.titre;
                const fakeTitles = getRandomTitles(correctTitle, measure.id);
                let options = [correctTitle, ...fakeTitles];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                currentQuestion = {
                    description: measure.resume,
                    correctTitle: correctTitle,
                    options: options,
                    measureId: measure.id
                };
                waitingForNext = false;
                document.getElementById('questionText').innerHTML = `📖 ${currentQuestion.description}`;
                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = '';
                currentQuestion.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.addEventListener('click', () => checkAnswer(opt, btn));
                    optionsContainer.appendChild(btn);
                });
                document.getElementById('feedback').innerHTML = '';
                nextBtn.style.display = 'none';
                updateUI();
            }
            
            function checkAnswer(selected, btnElement) {
                if (waitingForNext || !gameActive) return;
                waitingForNext = true;
                const isCorrect = (selected === currentQuestion.correctTitle);
                questionsAnswered++;
                if (isCorrect) score++;
                if (isCorrect) {
                    document.getElementById('feedback').innerHTML = '<div class="feedback correct-feedback">✅ Bonne réponse !</div>';
                } else {
                    document.getElementById('feedback').innerHTML = `<div class="feedback wrong-feedback">❌ Mauvaise réponse. La bonne réponse était : "${currentQuestion.correctTitle}".</div>`;
                }
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    if (btn.textContent === currentQuestion.correctTitle) {
                        btn.classList.add('correct');
                    } else if (btn === btnElement && btn.textContent !== currentQuestion.correctTitle) {
                        btn.classList.add('wrong');
                    }
                    btn.disabled = true;
                });
                updateUI();
                if (maxQuestions !== -1 && questionsAnswered >= maxQuestions) {
                    endGame();
                } else {
                    nextBtn.style.display = 'block';
                }
            }
            
            function nextQuestion() {
                if (!waitingForNext || !gameActive) return;
                generateQuestion();
            }
            
            function restartGame() {
                score = 0;
                questionsAnswered = 0;
                waitingForNext = false;
                gameActive = true;
                maxQuestions = parseInt(select.value);
                if (maxQuestions === -1) maxQuestions = -1;
                totalQuestions = maxQuestions;
                questionArea.style.display = 'block';
                shareArea.style.display = 'none';
                generateQuestion();
                updateUI();
            }
            
            // Événements
            nextBtn.addEventListener('click', nextQuestion);
            restartBtn.addEventListener('click', restartGame);
            select.addEventListener('change', () => {
                if (!gameActive || (questionsAnswered === 0)) {
                    restartGame();
                } else {
                    if (confirm('Changer le nombre de questions redémarrera le quizz. Continuer ?')) {
                        restartGame();
                    } else {
                        select.value = (maxQuestions === -1 ? '-1' : maxQuestions.toString());
                    }
                }
            });
            
            // Initialisation
            restartGame();
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initQuizz);
        } else {
            initQuizz();
        }
    </script>
</body>
</html>
