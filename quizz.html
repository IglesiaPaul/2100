<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz - Programme L'Avenir en commun</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .quizz-container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            background: #f5f5f5;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border-left: 5px solid #2b9e4a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover {
            border-color: #2b9e4a;
            background: #e8f5e9;
        }
        .option-btn.correct {
            background: #2b9e4a;
            color: white;
            border-color: #2b9e4a;
        }
        .option-btn.wrong {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }
        .feedback {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 12px;
            font-weight: bold;
        }
        .feedback.correct-feedback {
            background: #e8f5e9;
            color: #2b9e4a;
        }
        .feedback.wrong-feedback {
            background: #fdeded;
            color: #e74c3c;
        }
        .score {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .next-btn {
            background: #2b9e4a;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            display: block;
            margin: 1rem auto 0;
        }
        .error-message {
            background: #fdeded;
            color: #e74c3c;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <script src="js/nav.js"></script>

    <div class="quizz-container" id="quizzContainer">
        <div class="score" id="scoreDisplay">Score : 0 / 0</div>
        <div id="questionArea">
            <div class="question-text" id="questionText">Chargement...</div>
            <div class="options" id="optionsContainer"></div>
            <div id="feedback"></div>
            <button id="nextBtn" class="next-btn" style="display: none;">Question suivante →</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        function initQuizz() {
            if (typeof mesures === 'undefined' || !mesures.length) {
                console.error("mesures non défini ou vide");
                document.getElementById('questionText').innerHTML = '<div class="error-message">❌ Base de données non chargée. Vérifiez que le fichier js/data.js existe et contient la variable "mesures".</div>';
                return;
            }
            
            console.log(`✅ Quizz initialisé avec ${mesures.length} mesures`);
            
            let currentMesures = mesures;
            let currentQuestion = null;
            let score = 0;
            let questionsAnswered = 0;
            let waitingForNext = false;
            
            function getRandomTitles(excludeTitle, excludeId) {
                const others = currentMesures.filter(m => m.id !== excludeId && m.titre !== excludeTitle);
                for (let i = others.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [others[i], others[j]] = [others[j], others[i]];
                }
                return others.slice(0, 3).map(m => m.titre);
            }
            
            function generateQuestion() {
                if (!currentMesures.length) return;
                const randomIndex = Math.floor(Math.random() * currentMesures.length);
                const measure = currentMesures[randomIndex];
                const correctTitle = measure.titre;
                const fakeTitles = getRandomTitles(correctTitle, measure.id);
                let options = [correctTitle, ...fakeTitles];
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                currentQuestion = {
                    description: measure.resume,
                    correctTitle: correctTitle,
                    options: options,
                    measureId: measure.id
                };
                waitingForNext = false;
                
                document.getElementById('questionText').innerHTML = `📖 ${currentQuestion.description}`;
                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = '';
                currentQuestion.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.addEventListener('click', () => checkAnswer(opt, btn));
                    optionsContainer.appendChild(btn);
                });
                document.getElementById('feedback').innerHTML = '';
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('scoreDisplay').innerHTML = `Score : ${score} / ${questionsAnswered}`;
            }
            
            function checkAnswer(selected, btnElement) {
                if (waitingForNext) return;
                waitingForNext = true;
                const isCorrect = (selected === currentQuestion.correctTitle);
                questionsAnswered++;
                if (isCorrect) {
                    score++;
                    document.getElementById('feedback').innerHTML = '<div class="feedback correct-feedback">✅ Bonne réponse !</div>';
                } else {
                    document.getElementById('feedback').innerHTML = `<div class="feedback wrong-feedback">❌ Mauvaise réponse. La bonne réponse était : "${currentQuestion.correctTitle}".</div>`;
                }
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    if (btn.textContent === currentQuestion.correctTitle) {
                        btn.classList.add('correct');
                    } else if (btn === btnElement && btn.textContent !== currentQuestion.correctTitle) {
                        btn.classList.add('wrong');
                    }
                    btn.disabled = true;
                });
                document.getElementById('scoreDisplay').innerHTML = `Score : ${score} / ${questionsAnswered}`;
                document.getElementById('nextBtn').style.display = 'block';
            }
            
            function nextQuestion() {
                if (!waitingForNext) return;
                generateQuestion();
            }
            
            generateQuestion();
            document.getElementById('nextBtn').addEventListener('click', nextQuestion);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initQuizz);
        } else {
            initQuizz();
        }
    </script>
</body>
</html>
