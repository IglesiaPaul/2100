<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesure · SOLARPUNK/France2100</title>
    <meta name="description" content="Détail de la mesure du programme L'Avenir en commun">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #eaf7e8 0%, #d4e9d0 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            color: #1e2f2c;
        }
        .measure-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 2;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e4d3a;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
            border: 1px solid rgba(80, 140, 100, 0.3);
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(-4px);
        }
        .measure-navigation {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .measure-navigation a, .measure-navigation span {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e4d3a;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid rgba(80, 140, 100, 0.3);
        }
        .measure-navigation a:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(2px);
        }
        .measure-navigation .disabled {
            opacity: 0.5;
            cursor: default;
        }
        .measure-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(80, 140, 100, 0.3);
        }
        .measure-counter {
            font-size: 0.8rem;
            color: #3a6b58;
            margin-bottom: 0.5rem;
        }
        .measure-tag {
            display: inline-block;
            background: rgba(60, 120, 80, 0.15);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        .measure-badges {
            margin-bottom: 0.5rem;
        }
        .badge-star {
            background: linear-gradient(95deg, #ffc107, #ff9800);
            color: #1e2f2c;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .measure-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1b4d3e;
            margin: 0.5rem 0 1rem;
        }
        .save-button {
            background: linear-gradient(95deg, #2b9e4a, #1e6b34);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: transform 0.1s;
        }
        .save-button.saved {
            background: #6c7a6e;
        }
        .resume-box {
            background: rgba(220, 240, 220, 0.6);
            border-left: 5px solid #3a8c6e;
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(80, 140, 100, 0.2);
        }
        .section h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section p, .section .chiffre {
            color: #2c4a3e;
            line-height: 1.5;
        }
        .chiffre {
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(60, 120, 80, 0.1);
            padding: 0.8rem;
            border-radius: 20px;
            text-align: center;
        }
        .financement {
            background: rgba(255, 245, 200, 0.6);
        }
        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .share-btn {
            background: rgba(100, 140, 110, 0.15);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e4d3a;
            font-size: 0.8rem;
            transition: all 0.2s;
            border: 1px solid rgba(80, 140, 100, 0.3);
        }
        .share-btn:hover {
            background: rgba(100, 140, 110, 0.3);
            transform: translateY(-2px);
        }
        .similar-measures {
            margin-top: 2rem;
        }
        .similar-measures h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 1rem;
        }
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .similar-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            border: 1px solid rgba(80, 140, 100, 0.2);
        }
        .similar-card:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            border-color: #8fc0a9;
        }
        .similar-tag {
            display: inline-block;
            background: rgba(60, 120, 80, 0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 0.5rem;
        }
        .similar-card h4 {
            font-size: 1rem;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 0.3rem;
        }
        .similar-card p {
            font-size: 0.8rem;
            color: #3a6b58;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem;
            color: #3a6b58;
            border-top: 1px solid rgba(60, 110, 80, 0.2);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .measure-header h1 { font-size: 1.4rem; }
            .section h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <script src="js/nav.js"></script>

    <div class="measure-container">
        <a href="index.html" class="back-link">← Retour à l'accueil</a>
        <div id="measureNavigation"></div>
        <div id="measureContent">Chargement...</div>
        <div class="similar-measures">
            <h3>📌 Mesures similaires</h3>
            <div id="similarContent" class="similar-grid">
                <div style="text-align: center; grid-column: 1/-1;">Chargement...</div>
            </div>
        </div>
    </div>

    <footer>
        <p>L'Avenir en commun - Programme de l'Union Populaire</p>
        <p style="margin-top: 0.5rem; font-size: 0.75rem;">Site indépendant de vulgarisation - Toutes les mesures sont accessibles gratuitement</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/measure.js"></script>
</body>
</html>
